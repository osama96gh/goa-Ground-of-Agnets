[[package]]
name = "goa"
version = "0.1.0"
source = { editable = "goa-core" }
dependencies = [
    { name = "aiosqlite" },
    { name = "fastapi" },
    { name = "httpx" },
    { name = "pydantic" },
    { name = "python-multipart" },
    { name = "sse-starlette" },
    { name = "uvicorn", extra = ["standard"] },
]

[package.optional-dependencies]
postgres = [
    { name = "asyncpg" },
]
s3 = [
    { name = "aioboto3" },
]
supabase = [
    { name = "aioboto3" },
    { name = "asyncpg" },
]

[package.dev-dependencies]
dev = [
    { name = "aioboto3" },
    { name = "anyio" },
    { name = "asyncpg" },
    { name = "honcho" },
    { name = "pytest" },
    { name = "pytest-asyncio" },
    { name = "pytest-timeout" },
    { name = "testcontainers", extra = ["minio"] },
]

